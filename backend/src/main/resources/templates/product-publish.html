<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Producto | ReMarket+</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" type="text/css" href="/css/styles.css">
</head>

<body class="bg-light">

    {{> navbar}}

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm p-4">


                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <div>
                            <h3 class="fw-bold mb-4">Publicar Producto</h3>
                        </div>
                    </div>

                    <p class="text-muted small">Completa los datos para poner tu artículo a la venta.</p>
                    <form action="/publish_new_product" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-bold" for="productName">Nombre del Producto</label>
                            <input type="text" class="form-control" id="productName" name="productName"
                                placeholder="Ej. MacBook Pro 2021" minlength=3 maxlength="100" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold" for="price">Precio (€)</label>
                            <!--Minimun price to sell is 1 cent-->
                            <input type="number" class="form-control" id="price" name="price" placeholder="0.00" min="1"
                                step="0.01" required>
                        </div>
                        <div class="mb-3">

                            <!--If the user is not an admin-->
                            {{^isAdmin}}
                            <span class="form-label fw-bold d-block mb-2">Estado del artículo</span>
                            <div class="btn-group w-100" role="group">
                                <p>Segunda mano</p>
                            </div>
                            <input type="hidden" name="state" value="2">
                            {{/isAdmin}}

                            <!--If the user is an admin (only admins can upload new and reconditioned productos)-->
                            {{#isAdmin}}
                            <label class="form-label fw-bold">Estado del artículo</label>
                            <select class="form-select" id="state" name="state" required>
                                <option value="-1" disabled selected>Selecciona el estado...</option>
                                <option value="0">Nuevo</option>
                                <option value="1">Reacondicionado</option>
                                <option value="2">Segunda mano</option>
                            </select>
                            {{/isAdmin}}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold" for="description">Descripción</label>
                            <textarea class="form-control" id="description" name="description" rows="4"
                                placeholder="Describe brevemente el estado y características de tu producto"
                                minlength="15" maxlength="1000" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold" for="images">Imagen</label>
                            <input type="file" class="form-control" id="images" name="productimages" accept="image/*"
                                multiple required>
                            <small class="form-text text-muted">Debes adjuntar al menos una imagen del producto</small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-4 py-2 fw-bold">
                            Publicar Ahora
                        </button>
                        <input type="hidden" name="_csrf" value="{{token}}" />
                    </form>
                    <div class="mt-4 text-center">
                        <a href="/" class="btn btn-danger py-2 fw-bold shadow-sm" title="Volver a la tienda">
                            Volver a la tienda
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    {{> footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
