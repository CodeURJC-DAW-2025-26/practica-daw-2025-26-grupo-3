{{#products}}
<div class="col-md-3">
    <div class="card h-100 border-0 shadow-sm product-card position-relative">
        <!--<span class="position-absolute top-0 end-0 m-3 badge bg-success">-15%</span>-->
        {{#hasImage}}
        <img src="/product-images/{{id}}" class="card-img-top product-img" alt="{{productName}}">
        {{/hasImage}}
        {{^hasImage}}
        <img src="https://placehold.co/300x250/667eea/ffffff?text={{productName}}" class="card-img-top product-img"
            alt="Producto">
        {{/hasImage}}
        <div class="card-body">
            <span class="badge rounded-pill {{stateClass}} mb-2">{{stateName}}</span>
            <h5 class="card-title h6 fw-bold">{{productName}}</h5>
            <p class="text-primary fw-bold fs-5 mb-1">{{price}}€</p>
            <div class="small text-warning">★★★★☆ <span class="text-muted">(24)</span></div>
        </div>
        <div class="card-footer bg-transparent border-0 pb-3">
            {{^user_logged}}
            <a href="/login" class="btn btn-sm btn-primary w-100 rounded-pill">Iniciar
                sesión para ver más detalles</a>
            {{/user_logged}}
            {{#user_logged}}
            <a href="/product_detail/{{id}}" class="btn btn-sm btn-primary w-100 rounded-pill">Ver detalles</a>
            {{/user_logged}}
        </div>
    </div>
</div>
{{/products}}
