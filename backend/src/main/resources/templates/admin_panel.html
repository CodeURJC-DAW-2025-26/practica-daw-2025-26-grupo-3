<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | ReMarket+</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

    <div class="container-fluid my-4">

        <div class="row">

            <div class="col-md-3 col-lg-2 px-0">
                {{>sidebar}}
            </div>

            <div class="col-md-9 col-lg-10 py-3 px-4">

                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                    <h2 class="h3 fw-bold text-dark">Panel de Control</h2>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center p-3">
                            <h6 class="fw-bold text-muted small text-uppercase">Ventas Totales</h6>
                            <p class="display-6 fw-bold text-primary mb-0">€{{totalAmountMoney}}</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center p-3">
                            <h6 class="fw-bold text-muted small text-uppercase">Usuarios Registrados</h6>
                            <p class="display-6 fw-bold text-success mb-0">{{totalUsers}}</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center p-3">
                            <h6 class="fw-bold text-muted small text-uppercase">Pedidos Pendientes</h6>
                            <p class="display-6 fw-bold text-warning mb-0">{{pendingOrders}}</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center p-3">
                            <h6 class="fw-bold text-muted small text-uppercase">Productos Publicados</h6>
                            <p class="display-6 fw-bold text-info mb-0">{{totalProducts}}</p>
                        </div>
                    </div>
                </div>

                <div class="row g-4">

                    <div class="col-md-6 col-lg-6">
                        <div class="card shadow-sm border-0 p-4 h-100">
                            <h6 class="fw-bold mb-3 text-dark">Top Productos</h6>
                            <div class="chart-box">
                                <canvas id="productosChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-6">
                        <div class="card shadow-sm border-0 p-4 h-100">
                            <h6 class="fw-bold mb-3 text-dark">Tipos de Pedidos</h6>
                            <div class="chart-box">
                                <canvas id="pedidosChart"></canvas>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
