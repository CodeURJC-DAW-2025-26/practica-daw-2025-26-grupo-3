<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | ReMarket+</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

    <div class="container-fluid">

        <div class="row min-vh-100">

            <div class="col-md-3 col-lg-2 px-0 bg-light border-end">
                {{>sidebar}}
            </div>

            <div class="col-md-9 col-lg-10 py-3 px-4">

                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                    <h2 class="h3 fw-bold text-dark">Panel de Control</h2>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center p-3">
                            <h6 class="fw-bold text-muted small text-uppercase">Ventas Totales</h6>
                            <p class="display-6 fw-bold text-primary mb-0">€{{totalAmountMoney}}</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center p-3">
                            <h6 class="fw-bold text-muted small text-uppercase">Usuarios Registrados</h6>
                            <p class="display-6 fw-bold text-success mb-0">{{totalUsers}}</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center p-3">
                            <h6 class="fw-bold text-muted small text-uppercase">Pedidos Pendientes</h6>
                            <p class="display-6 fw-bold text-warning mb-0">{{pendingOrders}}</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center p-3">
                            <h6 class="fw-bold text-muted small text-uppercase">Productos Publicados</h6>
                            <p class="display-6 fw-bold text-info mb-0">{{totalProducts}}</p>
                        </div>
                    </div>
                </div>

                <div class="row g-4">

                    <div class="col-md-6 col-lg-6">
                        <div class="card shadow-sm border-0 p-4 h-100">
                            <h6 class="fw-bold mb-3 text-dark">Top Productos</h6>
                            <div class="chart-box">
                                <canvas id="productosChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 col-lg-6">
                        <div class="card shadow-sm border-0 p-4 h-100">
                            <h6 class="fw-bold mb-3 text-dark">Distribución de Productos por Tipo</h6>
                            <div class="chart-box">
                                <canvas id="pedidosChart"></canvas>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            // Safe initialization. If the backend sends nothing, keep empty but don't fail.
            let nombresProductos = [];
            let ventasProductos = [];
            let datosTiposPedidos = [];

            // Use backticks to protect the code from syntax errors
            try {
                const strNombres = `{{& topProductNames }}`;
                if (strNombres.trim() !== '') nombresProductos = eval(strNombres);
            } catch (e) { console.warn("Esperando datos de productos..."); }

            try {
                const strVentas = `{{& topProductSales }}`;
                if (strVentas.trim() !== '') ventasProductos = eval(strVentas);
            } catch (e) { console.warn("Esperando datos de ventas..."); }

            try {
                const strPedidos = `{{& pedidosChartData }}`;
                if (strPedidos.trim() !== '') datosTiposPedidos = eval(strPedidos);
            } catch (e) { console.warn("Esperando datos de tipos de pedidos..."); }

            // --------------------------------------------------------
            // CHART 1: TOP 5 BEST-SELLING PRODUCTS (Bar Chart)
            // --------------------------------------------------------

            if (document.getElementById('productosChart') && nombresProductos.length > 0 && ventasProductos.length > 0) {
                const ctxProductos = document.getElementById('productosChart').getContext('2d');
                new Chart(ctxProductos, {
                    type: 'bar',
                    data: {
                        labels: nombresProductos,
                        datasets: [{
                            label: 'Unidades Vendidas',
                            data: ventasProductos,
                            backgroundColor: 'rgba(13, 110, 253, 0.7)', // Bootstrap Blue
                            borderColor: 'rgba(13, 110, 253, 1)',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { stepSize: 1 } // To prevent decimal numbers on the Y-axis
                            }
                        }
                    }
                });
            }

            // --------------------------------------------------------
            // CHART 2: PRODUCT TYPES DISTRIBUTION (Bar Chart)
            // --------------------------------------------------------

            if (document.getElementById('pedidosChart') && datosTiposPedidos.length > 0) {
                const ctxPedidos = document.getElementById('pedidosChart').getContext('2d');
                new Chart(ctxPedidos, {
                    type: 'bar',
                    data: {
                        labels: ['Nuevos', 'Reacondicionados', 'Segunda Mano'],
                        datasets: [{
                            label: 'Cantidad de Productos',
                            data: datosTiposPedidos,
                            backgroundColor: [
                                'rgba(25, 135, 84, 0.8)',  // Green
                                'rgba(255, 193, 7, 0.8)',  // Yellow
                                'rgba(220, 53, 69, 0.8)'   // Red
                            ],
                            borderColor: [
                                'rgba(25, 135, 84, 1)',
                                'rgba(255, 193, 7, 1)',
                                'rgba(220, 53, 69, 1)'
                            ],
                            borderWidth: 2,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        indexAxis: 'y',
                        scales: {
                            x: {
                                beginAtZero: true,
                                ticks: { stepSize: 1 }
                            }
                        },
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top'
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>

</html>
