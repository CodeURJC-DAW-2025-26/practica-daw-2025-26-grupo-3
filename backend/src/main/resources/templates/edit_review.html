<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Reseña | ReMarket+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="/assets/Logo_Remarket+.png" type="image/png">
    <style>
        .star-icon {
            transition: transform 0.1s ease;
        }

        .star-icon:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body class="bg-light">

    {{> navbar}}

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <form action="/edit_review/save/{{review.id}}" method="POST" class="card p-4 shadow-sm border-0">
                    <input type="hidden" name="_csrf" value="{{token}}" />

                    <div class="d-flex align-items-center mb-4">
                        <i class="bi bi-pencil-square fs-3 text-primary me-2"></i>
                        <h4 class="mb-0 fw-bold">Editar reseña</h4>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Título</label>
                        <input type="text" class="form-control" name="title" value="{{review.title}}" required
                            minlength="3" maxlength="100" placeholder="Título de la reseña">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Cuerpo del mensaje</label>
                        <textarea class="form-control" name="body" rows="4" required minlength="10" maxlength="1000"
                            placeholder="Escribe tu reseña">{{review.body}}</textarea>
                    </div>

                    <div class="mb-4 text-center p-3 bg-light rounded">
                        <label class="form-label d-block fw-bold">Valoración</label>
                        <div id="starRating" data-current="{{review.stars}}">
                            <input type="hidden" name="stars" id="starsInput" value="{{review.stars}}" required min="1"
                                max="5">
                            <span class="star" data-value="1"
                                style="color: #ffc107; font-size: 2.5rem; cursor:pointer;"><i
                                    class="bi bi-star star-icon"></i></span>
                            <span class="star" data-value="2"
                                style="color: #ffc107; font-size: 2.5rem; cursor:pointer;"><i
                                    class="bi bi-star star-icon"></i></span>
                            <span class="star" data-value="3"
                                style="color: #ffc107; font-size: 2.5rem; cursor:pointer;"><i
                                    class="bi bi-star star-icon"></i></span>
                            <span class="star" data-value="4"
                                style="color: #ffc107; font-size: 2.5rem; cursor:pointer;"><i
                                    class="bi bi-star star-icon"></i></span>
                            <span class="star" data-value="5"
                                style="color: #ffc107; font-size: 2.5rem; cursor:pointer;"><i
                                    class="bi bi-star star-icon"></i></span>
                        </div>
                    </div>

                    <div class="d-flex gap-3 mt-2">
                        <a href="javascript:history.back()"
                            class="btn btn-danger w-50 py-2 fw-bold text-decoration-none">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary w-50 py-2 fw-bold">Guardar cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    {{> footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // --- RATING (EDIT FORM STARS) ---
            const stars = document.querySelectorAll('.star');
            const input = document.getElementById('starsInput');
            const ratingContainer = document.getElementById('starRating');

            // Read the current rating value from the data-current attribute
            let current = parseInt(ratingContainer.getAttribute('data-current')) || 0;

            function paint(n) {
                stars.forEach((s, i) => {
                    const icon = s.querySelector('.star-icon');
                    if (i < n) icon.classList.replace('bi-star', 'bi-star-fill');
                    else icon.classList.replace('bi-star-fill', 'bi-star');
                });
            }

            // Paint stars initially to reflect the saved rating
            paint(current);

            stars.forEach((s, i) => {
                s.addEventListener('mouseenter', () => paint(i + 1));
                s.addEventListener('mouseleave', () => paint(current));
                s.addEventListener('click', () => {
                    current = i + 1;
                    input.value = current;
                    paint(current);
                });
            });
        });
    </script>
</body>

</html>
