<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos publicados | ReMarket+</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="/assets/Logo_Remarket+.png" type="image/png">
</head>

<body>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <div class="col-md-3 col-lg-2 px-0 bg-light border-end">
                {{>sidebar}}
            </div>

            <div class="col-md-9 col-lg-10 px-0 d-flex flex-column">

                <section class="py-5 bg-light border-bottom">
                    <div class="container">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h1 class="fw-bold">Productos Publicados</h1>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="py-5 flex-grow-1">
                    <div class="container">
                        <div class="row g-4">
                            {{#products}}
                            <div class="col-md-4 col-lg-3">
                                <div class="card h-100 border-0 shadow-sm product-card">
                                    <div class="position-relative">
                                        {{#hasImage}}
                                        <img src="/product-images/{{id}}" class="card-img-top product-img"
                                            alt="{{productName}}">
                                        {{/hasImage}}
                                        {{^hasImage}}
                                        <img src="https://placehold.co/300x250/667eea/ffffff?text={{productName}}"
                                            class="card-img-top product-img" alt="Producto">
                                        {{/hasImage}}
                                        <span class="position-absolute top-0 end-0 m-2 badge bg-success">Activo</span>
                                    </div>
                                    <div class="card-body">
                                        <span class="badge rounded-pill {{stateClass}} mb-2">{{stateName}}</span>
                                        <h5 class="card-title h6 fw-bold">{{productName}}</h5>
                                        <p class="text-primary fw-bold mb-0">{{price}}€</p>

                                    </div>
                                    <div class="card-footer bg-transparent border-0 pb-3">
                                        <div class="d-grid gap-2">
                                            <a href="/product_detail/{{id}}"
                                                class="btn btn-sm btn-primary d-flex align-items-center justify-content-center">
                                                <i class="bi bi-eye-fill me-2"></i> Ver Detalle
                                            </a>
                                            <a href="/edit_product/{{id}}"
                                                class="btn btn-sm btn-edit-custom text-white d-flex align-items-center justify-content-center">
                                                <i class="bi bi-pencil-square me-2"></i> Editar
                                            </a>
                                            <form action="/delete_product/{{id}}" method="post"
                                                style="display: inline;">

                                                <input type="hidden" name="_csrf" value="{{token}}" />

                                                <button type="submit"
                                                    onclick="return confirm('¿Estás seguro de que deseas borrar este producto?');"
                                                    class="btn btn-sm btn-danger d-flex align-items-center justify-content-center w-100">
                                                    <i class="bi bi-trash me-2"></i> Eliminar
                                                </button>

                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {{/products}}
                            {{^products}}
                            <div class="col-12">
                                <div class="alert alert-info text-center" role="alert">
                                    No se han encontrado productos publicados.
                                </div>
                            </div>
                            {{/products}}
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
